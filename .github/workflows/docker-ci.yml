name: CI - Build & Test Django Docker

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ ci-cd-test ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer ton code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installer Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 3. Build de ton image
      - name: Build Docker image
        run: docker build -t webapp .

      # 4. Lancer les tests Django (si tu en as)
      - name: Run Django tests
        run: |
          docker run webapp python manage.py test

      # 5. Scan de sécurité (Trivy)
      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: webapp
